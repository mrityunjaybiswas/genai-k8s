# This rule is not used by the project ai-workload-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the ai.workshop.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ai-workload-operator
    app.kubernetes.io/managed-by: kustomize
  name: aiapp-editor-role
rules:
- apiGroups:
  - ai.workshop.io
  resources:
  - aiapps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ai.workshop.io
  resources:
  - aiapps/status
  verbs:
  - get
